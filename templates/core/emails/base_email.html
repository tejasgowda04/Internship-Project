<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .wrapper {
            width: 100%;
            table-layout: fixed;
            background-color: #f3f4f6;
            padding: 40px 0;
        }
        .main {
            background-color: #ffffff;
            margin: 0 auto;
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            padding: 30px 40px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .header p {
            color: #d1fae5;
            margin: 8px 0 0 0;
            font-size: 14px;
        }
        .content {
            padding: 40px;
            color: #374151;
            font-size: 16px;
            line-height: 1.6;
        }
        .content h2 {
            color: #111827;
            font-size: 20px;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            margin: 24px 0;
        }
        .box-item {
            margin-bottom: 12px;
            display: block;
        }
        .box-item:last-child {
            margin-bottom: 0;
        }
        .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
            display: block;
            margin-bottom: 4px;
            font-weight: 600;
        }
        .value {
            color: #0f172a;
            font-weight: 500;
            font-size: 15px;
        }
        .btn {
            display: inline-block;
            background-color: #10b981;
            color: #ffffff !important;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            margin-top: 10px;
            text-align: center;
        }
        .footer {
            background-color: #f8fafc;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            padding: 30px;
            color: #64748b;
            font-size: 13px;
        }
        .text-emerald { color: #10b981; }
        .text-blue { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="wrapper">
        <table class="main" cellspacing="0" cellpadding="0">
            <tr>
                <td class="header">
                    <h1>FoodWasteChain</h1>
                    <p>Building a Zero-Waste Future with Blockchain</p>
                </td>
            </tr>
            <tr>
                <td class="content">
                    {% block content %}{% endblock %}
                </td>
            </tr>
            <tr>
                <td class="footer">
                    <p style="margin: 0 0 8px 0;">© {% now "Y" %} FoodWasteChain. All rights reserved.</p>
                    <p style="margin: 0;">This is an automated notification. Please do not reply directly to this email.</p>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
